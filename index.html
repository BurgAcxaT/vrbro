<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>VR Browser</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000; overflow:hidden;
  width:100vw; height:100vh;
  font-family:'Courier New',monospace;
  touch-action:none; user-select:none;
}

#vr-root {
  width:100vw; height:100vh;
  position:relative; display:flex;
}

/* LEFT EYE — master scene */
#scene-left {
  position:relative;
  width:50vw; height:100vh;
  overflow:hidden; flex-shrink:0;
}

/* RIGHT EYE — canvas mirror */
#scene-right {
  position:relative;
  width:50vw; height:100vh;
  overflow:hidden; flex-shrink:0;
  background:#000;
}
#mirror-canvas {
  position:absolute; top:0; left:0;
  width:100%; height:100%;
}

/* Camera */
#cam-video {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  min-width:100%; min-height:100%;
  width:auto; height:auto;
  object-fit:cover; z-index:0;
}
#cam-fallback {
  position:absolute; inset:0;
  background:radial-gradient(ellipse at 40% 40%,#050d1a,#000508);
  z-index:0;
}
.grid {
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(0,150,255,.06) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,150,255,.06) 1px,transparent 1px);
  background-size:44px 44px;
  animation:gs 12s linear infinite;
}
@keyframes gs { to { background-position:44px 44px; } }
.ftxt {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  color:rgba(0,180,255,.4); font-size:10px;
  letter-spacing:.25em; text-align:center; line-height:2;
}

/* Lens vignette */
.vignette {
  position:absolute; inset:0; z-index:1; pointer-events:none;
  background:radial-gradient(ellipse at center,
    transparent 48%, rgba(0,0,0,.4) 72%,
    rgba(0,0,0,.88) 90%, #000 100%);
}

/* Browser panel */
#browser-panel {
  position:absolute;
  z-index:10;
  width:90%; max-width:410px; height:63vh;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:rgba(3,10,25,.93);
  border:1px solid rgba(0,180,255,.3);
  border-radius:10px;
  box-shadow:0 0 26px rgba(0,140,255,.12), inset 0 1px 0 rgba(255,255,255,.04);
  display:flex; flex-direction:column; overflow:hidden;
}
#browser-panel.locked {
  border-color:rgba(0,255,130,.45);
  box-shadow:0 0 20px rgba(0,255,110,.15);
}

.bar {
  background:rgba(8,16,40,.97);
  padding:6px 10px;
  display:flex; align-items:center; gap:7px;
  border-bottom:1px solid rgba(0,160,255,.18);
  flex-shrink:0; min-height:36px;
}
.dots { display:flex; gap:5px; flex-shrink:0; }
.dot { width:8px; height:8px; border-radius:50%; }
.dr{background:#ff5f57;} .dy{background:#febc2e;} .dg{background:#28c840;}
#url-input {
  flex:1; background:rgba(0,15,40,.8);
  border:1px solid rgba(0,140,255,.3); border-radius:5px;
  padding:3px 8px; color:#7dd3fc;
  font-size:10px; font-family:inherit; outline:none;
}
.go-btn {
  background:rgba(0,90,190,.55);
  border:1px solid rgba(0,160,255,.4);
  color:#7dd3fc; padding:3px 9px; border-radius:5px;
  cursor:pointer; font-size:10px; font-family:inherit;
  flex-shrink:0;
}
#browser-frame {
  flex:1; border:none; background:#fff;
  display:block; width:100%; height:100%;
}

/* Cursor */
#cursor {
  position:absolute; z-index:20;
  width:20px; height:20px; pointer-events:none;
  transform:translate(-50%,-50%);
}
.cr-ring {
  position:absolute; inset:0;
  border:1.5px solid rgba(0,220,255,.75);
  border-radius:50%; animation:cp 2s infinite;
}
@keyframes cp { 50%{transform:scale(1.15);opacity:.8;} }
.cr-dot {
  position:absolute; top:50%; left:50%;
  width:5px; height:5px; border-radius:50%;
  background:rgba(0,230,255,.95);
  transform:translate(-50%,-50%);
  box-shadow:0 0 8px rgba(0,220,255,.9);
}
#cursor.clicking .cr-ring {
  animation:none; border-color:rgba(255,100,0,.9); transform:scale(.65);
}

/* HUD */
.hud { position:absolute; top:13px; z-index:15; pointer-events:none; }
.hud-l { left:11px; }
.hud-r { right:11px; text-align:right; }
.hud span {
  display:block; font-size:8px;
  color:rgba(0,200,255,.6);
  text-shadow:0 0 6px rgba(0,200,255,.35);
  letter-spacing:.1em; line-height:1.9; text-transform:uppercase;
}

/* Volume bar */
#vol-bar {
  position:absolute; right:12px; top:50%; transform:translateY(-50%);
  z-index:15; pointer-events:none;
  display:flex; flex-direction:column; align-items:center; gap:3px;
  opacity:0; transition:opacity .4s;
}
#vol-bar.show { opacity:1; }
.vl { font-size:7px; color:rgba(0,200,255,.8); letter-spacing:.12em; }
.vtrack {
  width:5px; height:90px;
  background:rgba(0,40,80,.6);
  border:1px solid rgba(0,130,255,.3);
  border-radius:3px; overflow:hidden;
  display:flex; flex-direction:column-reverse;
}
#vol-fill {
  width:100%;
  background:linear-gradient(to top,#00b4ff,#00ffcc);
  border-radius:3px; transition:height .1s;
  height:100%;
}

/* Lock badge */
#lock-badge {
  position:absolute; bottom:13px; left:50%;
  transform:translateX(-50%);
  z-index:15; pointer-events:none;
  font-size:8px; color:rgba(0,255,120,.7);
  letter-spacing:.2em; opacity:0; transition:opacity .4s;
}
#lock-badge.show { opacity:1; }

/* Center divider */
#divider {
  position:absolute; left:50%; top:0;
  width:3px; height:100%;
  background:linear-gradient(to bottom,#000,#0c1828,#000);
  z-index:50; transform:translateX(-50%); pointer-events:none;
}

/* Fullscreen button */
#fs-btn {
  position:fixed; top:10px; right:60px; z-index:300;
  background:rgba(0,15,40,.88);
  border:1px solid rgba(0,160,255,.38);
  color:rgba(0,200,255,.85);
  font-size:9px; letter-spacing:.12em;
  padding:5px 12px; border-radius:6px; cursor:pointer;
  font-family:'Courier New',monospace;
}

/* Notification */
#notif {
  position:fixed; top:10px; left:50%; transform:translateX(-50%);
  background:rgba(0,10,30,.92);
  border:1px solid rgba(0,160,255,.35);
  color:#7dd3fc; font-size:9px; letter-spacing:.1em;
  padding:5px 16px; border-radius:16px; z-index:400;
  opacity:0; transition:opacity .25s; pointer-events:none; white-space:nowrap;
}
#notif.on { opacity:1; }

/* Help panel */
#help {
  position:fixed; bottom:10px; left:50%; transform:translateX(-50%);
  background:rgba(0,10,28,.9);
  border:1px solid rgba(0,100,200,.3);
  border-radius:8px; padding:8px 16px; z-index:300;
  text-align:center; transition:opacity .5s;
}
#help.hide { opacity:0; pointer-events:none; }
#help p { color:rgba(0,190,255,.6); font-size:8px; letter-spacing:.1em; line-height:2; }

/* Gamepad live debug */
#gp-live {
  position:fixed; bottom:10px; right:10px; z-index:300;
  background:rgba(0,10,25,.85);
  border:1px solid rgba(0,80,160,.3);
  border-radius:6px; padding:5px 10px;
  font-size:7px; color:rgba(0,180,255,.5);
  letter-spacing:.08em; line-height:1.7;
  display:none;
}
</style>
</head>
<body>

<div id="vr-root">
  <!-- LEFT EYE -->
  <div id="scene-left">
    <video id="cam-video" autoplay playsinline muted></video>
    <div id="cam-fallback"><div class="grid"></div><div class="ftxt">[ NO CAMERA ]<br>ALLOW ACCESS</div></div>
    <div class="vignette"></div>

    <div class="hud hud-l">
      <span id="h-hdg">HDG: ---°</span>
      <span id="h-mag">MAG: OFF</span>
      <span id="h-gp">GP: --</span>
    </div>
    <div class="hud hud-r">
      <span id="h-vol">VOL: 100%</span>
      <span id="h-lock">LOCK: OFF</span>
    </div>

    <div id="browser-panel">
      <div class="bar">
        <div class="dots"><div class="dot dr"></div><div class="dot dy"></div><div class="dot dg"></div></div>
        <input id="url-input" type="text" value="https://www.wikipedia.org" spellcheck="false">
        <button class="go-btn" id="go-btn">GO</button>
      </div>
      <iframe id="browser-frame" src="https://www.wikipedia.org"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"></iframe>
    </div>

    <div id="cursor"><div class="cr-ring"></div><div class="cr-dot"></div></div>

    <div id="vol-bar"><div class="vl">VOL</div><div class="vtrack"><div id="vol-fill"></div></div></div>
    <div id="lock-badge">⊕ HDG LOCKED</div>
  </div>

  <!-- RIGHT EYE (mirror) -->
  <div id="scene-right">
    <canvas id="mirror-canvas"></canvas>
  </div>

  <div id="divider"></div>
</div>

<button id="fs-btn">⛶ FULLSCREEN</button>
<div id="notif"></div>

<div id="help">
  <p id="help-txt">
    🕹 СТИК — курсор &nbsp;|&nbsp; D-PAD ←→↑↓ — двигать браузер<br>
    ZL / L / стик нажать — КЛИК &nbsp;|&nbsp; SL — громче &nbsp;|&nbsp; SR — тише<br>
    − / + — lock/unlock heading &nbsp;|&nbsp; screenshot — сброс позиции
  </p>
</div>

<div id="gp-live"></div>

<script>
// ════════════════════════════════
// STATE
// ════════════════════════════════
const S = {
  panelX:0, panelY:0,
  curX:0, curY:0,
  volume:1,
  heading:0, pitch:0,
  magOk:false,
  locked:false, lockedHeading:0,
  gpIdx:null, prevBtn:[],
  volT:null,
};

const sceneLeft  = document.getElementById('scene-left');
const mirrorCvs  = document.getElementById('mirror-canvas');
const mCtx       = mirrorCvs.getContext('2d');
const video      = document.getElementById('cam-video');
const iframe     = document.getElementById('browser-frame');
const panel      = document.getElementById('browser-panel');
const cursorEl   = document.getElementById('cursor');

function initCursor() {
  S.curX = sceneLeft.offsetWidth  * 0.5;
  S.curY = sceneLeft.offsetHeight * 0.5;
}

// ════════════════════════════════
// RESIZE
// ════════════════════════════════
function resize() {
  mirrorCvs.width  = sceneLeft.offsetWidth;
  mirrorCvs.height = sceneLeft.offsetHeight;
}
resize();
window.addEventListener('resize', () => { resize(); initCursor(); updateCursor(); });

// ════════════════════════════════
// CAMERA
// ════════════════════════════════
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'environment', width:{ideal:1920}, height:{ideal:1080} },
      audio:false
    });
    video.srcObject = stream;
    document.getElementById('cam-fallback').style.display = 'none';
    notify('📷 КАМЕРА OK');
  } catch(e) {
    video.style.display = 'none';
    notify('⚠ НЕТ КАМЕРЫ');
  }
}

// ════════════════════════════════
// MIRROR DRAW
// ════════════════════════════════
function drawMirror() {
  const W = mirrorCvs.width, H = mirrorCvs.height;
  mCtx.clearRect(0,0,W,H);

  // 1. Camera frame
  if (video.readyState >= 2) {
    mCtx.drawImage(video, 0, 0, W, H);
  } else {
    mCtx.fillStyle='#020810'; mCtx.fillRect(0,0,W,H);
    mCtx.strokeStyle='rgba(0,150,255,.05)'; mCtx.lineWidth=1;
    for(let x=0;x<W;x+=44){mCtx.beginPath();mCtx.moveTo(x,0);mCtx.lineTo(x,H);mCtx.stroke();}
    for(let y=0;y<H;y+=44){mCtx.beginPath();mCtx.moveTo(0,y);mCtx.lineTo(W,y);mCtx.stroke();}
  }

  // 2. Panel shadow / bg
  const pr = panel.getBoundingClientRect();
  const sr = sceneLeft.getBoundingClientRect();
  const px = pr.left-sr.left, py = pr.top-sr.top;
  const pw = pr.width,        ph = pr.height;

  // Shadow
  mCtx.save();
  mCtx.shadowColor='rgba(0,140,255,.3)'; mCtx.shadowBlur=24;
  mCtx.fillStyle='rgba(3,10,25,.93)';
  roundRect(mCtx, px, py, pw, ph, 10);
  mCtx.fill();
  mCtx.restore();

  // Border
  mCtx.save();
  mCtx.strokeStyle = S.locked ? 'rgba(0,255,120,.45)' : 'rgba(0,180,255,.3)';
  mCtx.lineWidth=1;
  roundRect(mCtx, px, py, pw, ph, 10);
  mCtx.stroke();
  mCtx.restore();

  // Title bar bg
  mCtx.fillStyle='rgba(8,16,40,.97)';
  mCtx.fillRect(px, py, pw, 34);

  // Dots
  [['#ff5f57',px+10],['#febc2e',px+22],['#28c840',px+34]].forEach(([c,x])=>{
    mCtx.beginPath(); mCtx.arc(x, py+17, 4, 0, Math.PI*2);
    mCtx.fillStyle=c; mCtx.fill();
  });

  // URL
  mCtx.fillStyle='rgba(125,211,252,.7)';
  mCtx.font='9px Courier New';
  mCtx.fillText(document.getElementById('url-input').value.substring(0,36), px+50, py+21);

  // Content area placeholder
  mCtx.fillStyle='rgba(245,248,255,.97)';
  mCtx.fillRect(px, py+35, pw, ph-35);
  mCtx.fillStyle='rgba(0,100,180,.12)';
  mCtx.fillRect(px, py+35, pw, ph-35);
  mCtx.fillStyle='rgba(0,120,200,.3)';
  mCtx.font='8px Courier New'; mCtx.textAlign='center';
  mCtx.fillText('[ MIRROR ]', px+pw/2, py+ph/2);
  mCtx.textAlign='left';

  // 3. Cursor
  mCtx.save();
  mCtx.strokeStyle='rgba(0,220,255,.75)'; mCtx.lineWidth=1.5;
  mCtx.beginPath(); mCtx.arc(S.curX, S.curY, 9, 0, Math.PI*2); mCtx.stroke();
  mCtx.fillStyle='rgba(0,230,255,.9)';
  mCtx.beginPath(); mCtx.arc(S.curX, S.curY, 2.5, 0, Math.PI*2); mCtx.fill();
  mCtx.restore();

  // 4. Vignette
  const g = mCtx.createRadialGradient(W/2,H/2,H*.28, W/2,H/2,H*.7);
  g.addColorStop(0,'transparent');
  g.addColorStop(.7,'rgba(0,0,0,.35)');
  g.addColorStop(1,'rgba(0,0,0,.92)');
  mCtx.fillStyle=g; mCtx.fillRect(0,0,W,H);

  // 5. HUD text
  mCtx.fillStyle='rgba(0,200,255,.45)'; mCtx.font='8px Courier New';
  mCtx.fillText('HDG:'+Math.round(S.heading)+'°', 10,17);
  mCtx.fillText(S.magOk?'MAG:ON':'MAG:OFF', 10,28);
}

function roundRect(ctx, x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ════════════════════════════════
// ORIENTATION / MAGNETOMETER
// ════════════════════════════════
function initOrientation() {
  if (!window.DeviceOrientationEvent) return;
  if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission()
      .then(r=>{ if(r==='granted') listenOrient(); })
      .catch(()=>listenOrient());
  } else {
    listenOrient();
  }
}
function listenOrient() {
  window.addEventListener('deviceorientationabsolute', onOrient, true);
  window.addEventListener('deviceorientation', onOrient, true);
}
function onOrient(e) {
  let a = e.alpha||0;
  if (e.webkitCompassHeading !== undefined) a = e.webkitCompassHeading;
  S.heading = a; S.pitch = e.beta||0; S.magOk = true;
  document.getElementById('h-hdg').textContent = 'HDG: '+Math.round(a)+'°';
  document.getElementById('h-mag').textContent = 'MAG: ON';
  applyPanel();
}

// ════════════════════════════════
// PANEL TRANSFORM
// ════════════════════════════════
function applyPanel() {
  let ox=S.panelX, oy=S.panelY;
  if (S.locked && S.magOk) {
    let dH = S.heading - S.lockedHeading;
    if(dH>180) dH-=360; if(dH<-180) dH+=360;
    ox -= dH*7;
    oy -= S.pitch * 3;
  }
  const mxX = sceneLeft.offsetWidth  * 0.55;
  const mxY = sceneLeft.offsetHeight * 0.45;
  ox = Math.max(-mxX, Math.min(mxX, ox));
  oy = Math.max(-mxY, Math.min(mxY, oy));
  panel.style.transform = `translate(calc(-50% + ${ox}px), calc(-50% + ${oy}px))`;
}

function toggleLock() {
  if (S.locked) {
    S.locked=false;
    panel.classList.remove('locked');
    document.getElementById('lock-badge').classList.remove('show');
    document.getElementById('h-lock').textContent='LOCK: OFF';
    notify('🔓 ОТКРЕПЛЁН');
  } else {
    S.locked=true; S.lockedHeading=S.heading;
    panel.classList.add('locked');
    document.getElementById('lock-badge').classList.add('show');
    document.getElementById('h-lock').textContent='LOCK: ON';
    notify('🔒 ПРИВЯЗАН '+Math.round(S.heading)+'°');
  }
}

// ════════════════════════════════
// CURSOR
// ════════════════════════════════
function updateCursor() {
  cursorEl.style.left = S.curX+'px';
  cursorEl.style.top  = S.curY+'px';
}

// ════════════════════════════════
// CLICK
// ════════════════════════════════
function doClick() {
  cursorEl.classList.add('clicking');
  setTimeout(()=>cursorEl.classList.remove('clicking'), 160);

  const r = iframe.getBoundingClientRect();
  if (S.curX >= r.left && S.curX <= r.right && S.curY >= r.top && S.curY <= r.bottom) {
    try {
      const iDoc = iframe.contentDocument||iframe.contentWindow.document;
      const el = iDoc.elementFromPoint(S.curX-r.left, S.curY-r.top);
      if(el){ el.click(); el.focus&&el.focus(); }
    } catch(e) {
      iframe.focus();
    }
  } else {
    const el = document.elementFromPoint(S.curX, S.curY);
    if(el && el!==iframe){ el.click(); el.focus&&el.focus(); }
  }
  notify('CLICK (' + Math.round(S.curX) + ',' + Math.round(S.curY) + ')');
}

// ════════════════════════════════
// VOLUME
// ════════════════════════════════
function changeVolume(d) {
  S.volume = Math.max(0, Math.min(1, S.volume+d));
  try {
    iframe.contentWindow.document.querySelectorAll('audio,video')
      .forEach(a=>{ a.volume=S.volume; });
  } catch(e){}
  const pct = Math.round(S.volume*100);
  document.getElementById('h-vol').textContent='VOL: '+pct+'%';
  document.getElementById('vol-fill').style.height=pct+'%';
  const vb=document.getElementById('vol-bar');
  vb.classList.add('show');
  clearTimeout(S.volT);
  S.volT=setTimeout(()=>vb.classList.remove('show'),1800);
}

// ════════════════════════════════
// NAVIGATE
// ════════════════════════════════
function navigate(url) {
  if(!url) url=document.getElementById('url-input').value.trim();
  if(!url) return;
  if(!url.match(/^https?:\/\//)) url='https://'+url;
  document.getElementById('url-input').value=url;
  iframe.src=url;
  notify('↗ '+url.replace(/^https?:\/\//,'').substring(0,28));
}
document.getElementById('go-btn').addEventListener('click',()=>navigate());
document.getElementById('url-input').addEventListener('keydown',e=>{ if(e.key==='Enter') navigate(); });

// ════════════════════════════════
// FULLSCREEN
// ════════════════════════════════
document.getElementById('fs-btn').addEventListener('click', async ()=>{
  try {
    if(!document.fullscreenElement){
      await document.documentElement.requestFullscreen();
    } else {
      await document.exitFullscreen();
    }
    initOrientation(); // re-request on iOS
  } catch(e){ notify('⚠ FULLSCREEN НЕДОСТУПЕН'); }
});
document.addEventListener('fullscreenchange',()=>{
  document.getElementById('fs-btn').textContent =
    document.fullscreenElement ? '✕ EXIT FS' : '⛶ FULLSCREEN';
});

// ════════════════════════════════
// GAMEPAD
// Joy-Con (L) held sideways (horizontal, buttons on right side):
//   axes[0]/axes[1] = stick
//   btn[0]=← btn[1]=↓ btn[2]=↑ btn[3]=→
//   btn[4]=SL btn[5]=SR btn[6]=ZL btn[8]=L btn[9]=minus btn[10]=stick-press btn[16]=screenshot
//
// Joy-Con (R) held sideways:
//   axes[0]/axes[1] = stick
//   btn[0]=A btn[1]=X btn[2]=B btn[3]=Y
//   btn[4]=SL btn[5]=SR btn[7]=ZR btn[8]=R btn[9]=plus btn[10]=stick-press
//
// Standard / assembled:
//   axes 0/1=left-stick, 2/3=right-stick
//   btn 0=A 4=LB 5=RB 6=LT 7=RT 8=select 9=start 12=↑ 13=↓ 14=← 15=→
// ════════════════════════════════
window.addEventListener('gamepadconnected', e=>{
  S.gpIdx=e.gamepad.index;
  S.prevBtn=[];
  document.getElementById('h-gp').textContent='GP: ON';
  document.getElementById('help').classList.add('hide');
  document.getElementById('gp-live').style.display='block';
  notify('🎮 '+e.gamepad.id.substring(0,26));
});
window.addEventListener('gamepaddisconnected', e=>{
  if(e.gamepad.index===S.gpIdx){
    S.gpIdx=null;
    document.getElementById('h-gp').textContent='GP: --';
    document.getElementById('help').classList.remove('hide');
    document.getElementById('gp-live').style.display='none';
  }
});

function isPressed(gp,i)  { return !!(gp.buttons[i]&&gp.buttons[i].pressed); }
function isJust(gp,i)     { return isPressed(gp,i) && !(S.prevBtn[i]||false); }
function axisVal(gp,i,dz) { const v=gp.axes[i]||0; return Math.abs(v)>(dz||.15)?v:0; }
function btnVal(gp,i)     { return gp.buttons[i]?gp.buttons[i].value:0; }

function pollGamepad() {
  if(S.gpIdx===null) return;
  const gps=navigator.getGamepads();
  const gp=gps[S.gpIdx];
  if(!gp) return;

  const id  = gp.id.toLowerCase();
  const std = gp.mapping==='standard';
  const jcL = id.includes('(l)') || id.includes('left');
  const jcR = id.includes('(r)') || id.includes('right');
  const single = jcL || jcR; // single half joy-con

  // ── STICK → cursor ──
  const sx = axisVal(gp,0);
  const sy = axisVal(gp,1);
  if(sx||sy){
    S.curX = Math.max(0, Math.min(sceneLeft.offsetWidth,  S.curX + sx*6));
    S.curY = Math.max(0, Math.min(sceneLeft.offsetHeight, S.curY + sy*6));
    updateCursor();
  }

  // ── PANEL MOVE ──
  let mx=0, my=0;
  if(std){
    // right stick
    mx=axisVal(gp,2); my=axisVal(gp,3);
    // d-pad
    if(isPressed(gp,12)) my=-1;
    if(isPressed(gp,13)) my= 1;
    if(isPressed(gp,14)) mx=-1;
    if(isPressed(gp,15)) mx= 1;
  } else if(jcL){
    // d-pad buttons on Joy-Con (L) sideways: 0=← 1=↓ 2=↑ 3=→
    if(isPressed(gp,0)) mx=-1;
    if(isPressed(gp,3)) mx= 1;
    if(isPressed(gp,2)) my=-1;
    if(isPressed(gp,1)) my= 1;
  } else if(jcR){
    // A/B/X/Y as d-pad: A(0)=right, B(2)=down, X(1)=up, Y(3)=left
    if(isPressed(gp,3)) mx=-1;
    if(isPressed(gp,0)) mx= 1;
    if(isPressed(gp,1)) my=-1;
    if(isPressed(gp,2)) my= 1;
  }
  if(mx||my){ S.panelX+=mx*5; S.panelY+=my*5; applyPanel(); }

  // ── CLICK ──
  // JC-L: ZL(6), L(8), stick(10)
  // JC-R: ZR(7), R(8), stick(10)
  // std:  A(0), LT(6), RT(7), stick(10)
  const clickButtons = jcL ? [6,8,10] : jcR ? [7,8,10] : [0,6,7,10];
  if(clickButtons.some(i=>isJust(gp,i))) doClick();

  // ── VOLUME ──
  // JC-L & JC-R: SL(4) = +, SR(5) = -
  // std: RB(5)=+, LB(4)=-  OR  RT(7) analog, LT(6) analog
  if(single){
    if(isPressed(gp,4)) changeVolume( 0.025); // SL
    if(isPressed(gp,5)) changeVolume(-0.025); // SR
  } else {
    const rt=btnVal(gp,7), lt=btnVal(gp,6);
    if(rt>0.1) changeVolume( rt*0.018);
    if(lt>0.1) changeVolume(-lt*0.018);
    if(isJust(gp,5)) changeVolume( 0.1);
    if(isJust(gp,4)) changeVolume(-0.1);
  }

  // ── LOCK HEADING ──
  // JC-L: minus(9)  JC-R: plus(9)  std: start(9)
  if(isJust(gp,9)) toggleLock();

  // ── RESET PANEL ──
  // JC-L: screenshot(16)  std: select(8)
  if(isJust(gp,16)||isJust(gp,8)){
    S.panelX=0; S.panelY=0; applyPanel(); notify('↺ ПОЗИЦИЯ СБРОШЕНА');
  }

  // Live debug
  const axStr = Array.from({length:Math.min(gp.axes.length,4)}, (_,i)=>
    (gp.axes[i]||0).toFixed(2)
  ).join(' ');
  const btStr = gp.buttons.map((b,i)=>b.pressed?i:'').filter(Boolean).join(',');
  document.getElementById('gp-live').textContent =
    `AX:${axStr}\nBTN:[${btStr||'-'}]`;

  S.prevBtn = gp.buttons.map(b=>b.pressed);
}

// ════════════════════════════════
// TOUCH fallback
// ════════════════════════════════
let touchMoved=false;
document.addEventListener('touchstart', ()=>{ touchMoved=false; }, {passive:true});
document.addEventListener('touchmove', e=>{
  touchMoved=true;
  const t=e.touches[0];
  if(t.clientX < window.innerWidth/2){
    S.curX=t.clientX; S.curY=t.clientY;
    updateCursor();
  }
}, {passive:true});
document.addEventListener('touchend', e=>{
  if(!touchMoved){
    const t=e.changedTouches[0];
    if(t.clientX < window.innerWidth/2) doClick();
  }
});

// ════════════════════════════════
// NOTIFICATION
// ════════════════════════════════
let nT=null;
function notify(msg){
  const el=document.getElementById('notif');
  el.textContent=msg; el.classList.add('on');
  clearTimeout(nT); nT=setTimeout(()=>el.classList.remove('on'),2500);
}

// ════════════════════════════════
// MAIN LOOP
// ════════════════════════════════
function loop(){
  requestAnimationFrame(loop);
  pollGamepad();
  drawMirror();
}

// ════════════════════════════════
// BOOT
// ════════════════════════════════
initCursor();
startCamera();
initOrientation();
updateCursor();
applyPanel();
loop();

setTimeout(()=>{ document.getElementById('help').classList.add('hide'); }, 8000);
notify('VR BROWSER — нажми FULLSCREEN');
</script>
</body>
